<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>لوحة الإدارة</title>

<link rel="stylesheet" href="/style.css">

</head>


<body>


<header>

<div class="container">

<nav>

<div class="brand">
لوحة إدارة الاختبارات
</div>

<a href="/" class="btn gray">
الرئيسية
</a>

</nav>

</div>

</header>



<section class="section">


<div class="container">



<!-- تسجيل الدخول -->

<div id="loginCard" class="card">

<h2>
تسجيل دخول الإدارة
</h2>


<input
type="password"
id="password"
placeholder="كلمة المرور">



<button onclick="login()">
دخول
</button>


<div id="loginMsg"></div>


</div>





<!-- لوحة الإدارة -->

<div
id="adminPanel"
class="hidden">


<div class="admin-layout">

<div class="card">

<h2>إعدادات الصفحة الرئيسية</h2>

<input id="homeTitle" placeholder="عنوان الصفحة الرئيسية">

<textarea id="homeDescription" placeholder="وصف الصفحة الرئيسية"></textarea>

<input id="homeButtonText" placeholder="نص الزر">


<label>لون الخلفية</label>
<input id="backgroundColor" type="color" value="#ffffff">


<label>لون العنوان</label>
<input id="titleColor" type="color" value="#1e3a8a">


<label>لون الزر</label>
<input id="buttonColor" type="color" value="#2563eb">


<label>لون النص</label>
<input id="textColor" type="color" value="#000000">


<button onclick="saveHomeSettings()">
حفظ إعدادات الصفحة
</button>

</div>



<div class="card">

<h2>🔔 إشعار للطلاب</h2>

<input id="notificationTitle" placeholder="عنوان الإشعار">

<textarea id="notificationMessage" placeholder="نص الإشعار"></textarea>

<button onclick="addNotification()">
نشر الإشعار
</button>

<p id="notificationMsg"></p>

</div>

<!-- تغيير كلمة المرور داخل الإدارة -->

<div class="card">


<h2>
تغيير كلمة مرور الإدارة
</h2>


<input
id="oldPassword"
type="password"
placeholder="كلمة المرور الحالية">



<input
id="newPassword"
type="password"
placeholder="كلمة المرور الجديدة">



<button onclick="changeAdminPassword()">

تغيير كلمة المرور

</button>


<p id="passwordMessage"></p>


</div>





<!-- إضافة اختبار -->

<div class="card">


<h2>
إضافة اختبار
</h2>


<input
id="title"
placeholder="اسم الاختبار">



<input
id="duration"
type="number"
placeholder="مدة الاختبار بالدقائق">


<label>
عدد المحاولات المسموح بها
</label>


<input
id="attempts"
type="number"
min="1"
value="1"
>
<!-- إضافة أسئلة دفعة واحدة -->

<div class="card bulk-import-card">

<h2>
إضافة أسئلة دفعة واحدة
</h2>


<p class="muted">
الصق الأسئلة والخيارات والإجابة الصحيحة هنا ثم اضغط استيراد
</p>


<textarea
id="bulkQuestions"
rows="14"
placeholder="مثال:

1. ما عاصمة اليمن؟
أ) صنعاء
ب) عدن
ج) تعز
د) المكلا

الإجابة الصحيحة: أ

2. ما ناتج 2 + 2؟
أ) 3
ب) 4
ج) 5
د) 6

الإجابة الصحيحة: ب
"></textarea>



<div class="actions">


<button
type="button"
onclick="importBulkQuestions()">

استيراد الأسئلة

</button>



<button
type="button"
class="gray"
onclick="clearBulkQuestions()">

مسح النص

</button>


</div>


<p
id="bulkMessage"
class="muted">
</p>


</div>




<!-- الأسئلة اليدوية -->

<div id="questions"></div>



<button onclick="addQuestion()">

إضافة سؤال

</button>



<br><br>



<button onclick="saveExam()">

حفظ الاختبار

</button>



</div>
<!-- قائمة الاختبارات -->

<div class="card">

<h2>
الاختبارات الحالية
</h2>


<div id="examList">

جاري التحميل...

</div>


</div>


</div>

</div>

</div>


</section>



<script src="/app.js"></script>


</body>

</html>
